{% extends "base.html" %}
{% block title %}Q5 — Edit Doctor{% endblock %}
{% block content %}
<div class="text-center mb-4">
    <span class="hero-badge">Q5 · Update via PUT/PATCH</span>
    <h1 class="fw-700" style="font-size:2rem;">Edit Doctor — {{ doctor.name }}</h1>
</div>
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card-glass">
            <form method="post" action="/q5/edit/{{ doctor.pk }}/">
                {% csrf_token %}
                <div class="mb-3"><label class="form-label">Name</label><input type="text" name="name" class="form-control" value="{{ doctor.name }}" required></div>
                <div class="mb-3"><label class="form-label">Specialty</label><input type="text" name="specialty" class="form-control" value="{{ doctor.specialty }}" required></div>
                <div class="mb-3"><label class="form-label">Email</label><input type="email" name="contact_email" class="form-control" value="{{ doctor.contact_email }}" required></div>
                <div class="mb-3"><label class="form-label">Phone</label><input type="text" name="contact_phone" class="form-control" value="{{ doctor.contact_phone }}" required></div>
                <div class="mb-3"><label class="form-label">Hospital</label><input type="text" name="hospital" class="form-control" value="{{ doctor.hospital }}"></div>
                <div class="mb-3"><label class="form-label">City</label><input type="text" name="city" class="form-control" value="{{ doctor.city }}"></div>
                <div class="mb-3 form-check">
                    <input type="checkbox" name="available" class="form-check-input" id="av_edit" {% if doctor.available %}checked{% endif %}>
                    <label class="form-check-label" for="av_edit">Available</label>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary-glow flex-fill"><i class="bi bi-save"></i> Update (PUT)</button>
                    <a href="/q5/" class="btn flex-fill" style="background:rgba(255,255,255,0.06);color:var(--text-muted);border:1px solid var(--border);">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
