<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Doctor Map{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --black: #111111;
      --gray-900: #222222;
      --gray-700: #444444;
      --gray-500: #777777;
      --gray-400: #999999;
      --gray-300: #bbbbbb;
      --gray-200: #e0e0e0;
      --gray-100: #f0f0f0;
      --gray-50: #f8f8f8;
      --white: #ffffff;
      --border: #e0e0e0;
      --bg: #f8f8f8;
      --muted: #777777;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--black);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    nav {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: 0 1px 0 var(--gray-200);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-family: 'DM Serif Display', serif;
      font-size: 1.3rem;
      color: var(--black);
    }

    .nav-brand svg {
      width: 22px;
      height: 22px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: .2rem;
    }

    .nav-links a {
      padding: .38rem .82rem;
      border-radius: 6px;
      font-size: .86rem;
      font-weight: 500;
      color: var(--gray-700);
      transition: background .15s, color .15s;
    }

    .nav-links a:hover,
    .nav-links a.active {
      background: var(--gray-100);
      color: var(--black);
    }

    .nav-links .nav-cta {
      background: var(--black);
      color: var(--white) !important;
      border-radius: 7px;
    }

    .nav-links .nav-cta:hover {
      background: var(--gray-900);
    }

    main {
      flex: 1;
    }

    footer {
      background: var(--black);
      color: var(--gray-500);
      text-align: center;
      padding: 1.4rem 2rem;
      font-size: .8rem;
      letter-spacing: .03em;
    }

    footer strong {
      color: var(--gray-300);
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: .2rem .62rem;
      border-radius: 99px;
      font-size: .74rem;
      font-weight: 600;
    }

    .badge-dark {
      background: var(--black);
      color: var(--white);
    }

    .badge-gray {
      background: var(--gray-100);
      color: var(--gray-700);
      border: 1px solid var(--gray-200);
    }

    .badge-green {
      background: #e9f9ef;
      color: #1a6638;
      border: 1px solid #b3e8c8;
    }

    .badge-red {
      background: #fdecea;
      color: #8b1a1a;
      border: 1px solid #f5c2c2;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .4rem;
      padding: .62rem 1.3rem;
      border-radius: 8px;
      font-size: .87rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-family: 'DM Sans', sans-serif;
      transition: transform .15s, box-shadow .15s, background .15s;
      text-decoration: none;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(0, 0, 0, .13);
    }

    .btn:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .btn-dark {
      background: var(--black);
      color: var(--white);
    }

    .btn-dark:hover {
      background: var(--gray-900);
    }

    .btn-outline {
      background: transparent;
      color: var(--black);
      border: 1.5px solid var(--black);
    }

    .btn-outline:hover {
      background: var(--gray-100);
    }
  </style>
  {% block extra_css %}{% endblock %}
</head>

<body>

  <nav>
    <a href="{% url 'doctor_map:map_home' %}" class="nav-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
        <circle cx="12" cy="10" r="3" />
      </svg>
      DoctorMap
    </a>

    <div class="nav-links">
      <a href="{% url 'doctor_map:map_home' %}"
        class="{% if request.resolver_match.url_name == 'map_home' %}active{% endif %}">
        🗺️ Live Map
      </a>
      <a href="{% url 'doctor_map:about' %}"
        class="{% if request.resolver_match.url_name == 'about' %}active{% endif %}">
        About
      </a>
    </div>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <p>© 2025 <strong>DoctorMap</strong> &nbsp;·&nbsp; Django + Google Maps API &nbsp;·&nbsp; </p>
  </footer>

</body>

</html>
