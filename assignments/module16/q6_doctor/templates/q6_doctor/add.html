{% extends 'base.html' %}
{% block title %}Add Doctor{% endblock %}
{% block content %}
<div class="container fade-in" style="max-width:700px;">
  <a href="/q6/" class="back-link">← Back to Doctors</a>
  <div class="page-header"><h1>Add Doctor Profile</h1></div>
  <div class="card">
    <form method="post">{% csrf_token %}
      <div class="grid-2">
        <div class="form-group"><label>Full Name</label><input name="name" class="form-control" required></div>
        <div class="form-group"><label>Specialty</label>
          <select name="specialty" class="form-control">
            {% for val, label in form.fields.specialty.choices %}<option value="{{ val }}">{{ label }}</option>{% endfor %}
          </select>
        </div>
        <div class="form-group"><label>Hospital</label><input name="hospital" class="form-control" required></div>
        <div class="form-group"><label>City</label><input name="city" class="form-control" required></div>
        <div class="form-group"><label>Phone</label><input name="phone" class="form-control" required></div>
        <div class="form-group"><label>Email</label><input name="email" type="email" class="form-control" required></div>
        <div class="form-group"><label>Experience (years)</label><input name="experience_years" type="number" class="form-control" value="1" min="0"></div>
        <div class="form-group"><label>Consultation Fee (₹)</label><input name="fee" type="number" class="form-control" value="500" step="0.01"></div>
      </div>
      <div class="form-group">
        <label><input type="checkbox" name="is_available" checked style="margin-right:0.5rem;"> Available for Appointments</label>
      </div>
      <button type="submit" class="btn btn-primary">Save Doctor Profile</button>
      <a href="/q6/" class="btn btn-outline" style="margin-left:0.5rem;">Cancel</a>
    </form>
  </div>
</div>
<div id="toast" class="toast"></div>
{% endblock %}
