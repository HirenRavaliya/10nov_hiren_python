<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Doctor Finder{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --black: #111111;
            --gray-900: #222222;
            --gray-700: #444444;
            --gray-500: #777777;
            --gray-300: #bbbbbb;
            --gray-200: #e0e0e0;
            --gray-100: #f0f0f0;
            --gray-50: #f8f8f8;
            --white: #ffffff;
            --ink: #111111;
            --muted: #777777;
            --border: #e0e0e0;
            --bg: #f8f8f8;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        
        nav {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 62px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 0 var(--gray-200);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: .55rem;
            font-family: 'DM Serif Display', serif;
            font-size: 1.35rem;
            color: var(--black);
            letter-spacing: -.01em;
        }

        .nav-brand svg {
            width: 22px;
            height: 22px;
        }

        .nav-links {
            display: flex;
            gap: .2rem;
            align-items: center;
        }

        .nav-links a {
            padding: .4rem .85rem;
            border-radius: 6px;
            font-size: .88rem;
            font-weight: 500;
            color: var(--gray-700);
            transition: background .15s, color .15s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            background: var(--gray-100);
            color: var(--black);
        }

        .nav-cta {
            background: var(--black) !important;
            color: var(--white) !important;
            border-radius: 7px !important;
        }

        .nav-cta:hover {
            background: var(--gray-900) !important;
        }

        
        main {
            flex: 1;
        }

        
        footer {
            background: var(--black);
            color: var(--gray-500);
            text-align: center;
            padding: 1.6rem 2rem;
            font-size: .82rem;
            letter-spacing: .03em;
        }

        footer strong {
            color: var(--gray-300);
        }

        
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: .2rem .65rem;
            border-radius: 99px;
            font-size: .76rem;
            font-weight: 600;
            letter-spacing: .02em;
        }

        .badge-dark {
            background: var(--black);
            color: var(--white);
        }

        .badge-gray {
            background: var(--gray-100);
            color: var(--gray-700);
            border: 1px solid var(--gray-200);
        }

        .badge-green {
            background: #e9f9ef;
            color: #1a6638;
            border: 1px solid #b3e8c8;
        }

        .badge-red {
            background: #fdecea;
            color: #8b1a1a;
            border: 1px solid #f5c2c2;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: .4rem;
            padding: .65rem 1.35rem;
            border-radius: 8px;
            font-size: .88rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-family: 'DM Sans', sans-serif;
            transition: transform .15s, box-shadow .15s, background .15s;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 0, 0, .14);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: var(--black);
            color: var(--white);
        }

        .btn-primary:hover {
            background: var(--gray-900);
        }

        .btn-outline {
            background: transparent;
            color: var(--black);
            border: 1.5px solid var(--black);
        }

        .btn-outline:hover {
            background: var(--gray-100);
        }

        .star {
            color: #555;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>

<body>

    <nav>
        <a href="{% url 'doctor_finder:home' %}" class="nav-brand">

            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path
                    d="M4.8 2.3A.3.3 0 1 0 5 2H4a2 2 0 0 0-2 2v5a6 6 0 0 0 6 6 6 6 0 0 0 6-6V4a2 2 0 0 0-2-2h-1a.2.2 0 1 0 .3.3" />
                <path d="M8 15v1a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6v-4" />
                <circle cx="20" cy="10" r="2" />
            </svg>
            DoctorFinder
        </a>

        <div class="nav-links">
            <a href="{% url 'doctor_finder:home' %}"
                class="{% if request.resolver_match.url_name == 'home' %}active{% endif %}">
                Home
            </a>
            <a href="{% url 'doctor_finder:contact' %}"
                class="nav-cta {% if request.resolver_match.url_name == 'contact' %}active{% endif %}">
                Book Appointment
            </a>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>© 2025 <strong>DoctorFinder</strong> &nbsp;·&nbsp; Built with Django &nbsp;·&nbsp; URL Routing Lab</p>
    </footer>

</body>

</html>
