<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Social Auth{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --black: #111111;
            --gray-900: #222222;
            --gray-700: #444444;
            --gray-500: #777777;
            --gray-400: #999999;
            --gray-300: #bbbbbb;
            --gray-200: #e0e0e0;
            --gray-100: #f0f0f0;
            --gray-50: #f8f8f8;
            --white: #ffffff;
            --ink: #111111;
            --muted: #777777;
            --border: #e0e0e0;
            --bg: #f8f8f8;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        
        nav {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 62px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: .5rem;
            font-family: 'DM Serif Display', serif;
            font-size: 1.3rem;
            color: var(--black);
        }

        .nav-brand svg {
            width: 22px;
            height: 22px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: .5rem;
        }

        .nav-right a {
            padding: .38rem .85rem;
            border-radius: 6px;
            font-size: .86rem;
            font-weight: 500;
            color: var(--gray-700);
            transition: background .15s;
        }

        .nav-right a:hover {
            background: var(--gray-100);
            color: var(--black);
        }

        .nav-right .nav-pill {
            background: var(--black);
            color: var(--white);
            border-radius: 7px;
        }

        .nav-right .nav-pill:hover {
            background: var(--gray-900);
            color: var(--white);
        }

        
        main {
            flex: 1;
        }

        
        footer {
            background: var(--black);
            color: var(--gray-500);
            text-align: center;
            padding: 1.5rem 2rem;
            font-size: .8rem;
            letter-spacing: .03em;
        }

        footer strong {
            color: var(--gray-300);
        }

        
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: .45rem;
            padding: .65rem 1.35rem;
            border-radius: 8px;
            font-size: .88rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-family: 'DM Sans', sans-serif;
            transition: transform .15s, box-shadow .15s, background .15s;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(0, 0, 0, .12);
        }

        .btn:active {
            transform: translateY(0);
            box-shadow: none;
        }

        .btn-dark {
            background: var(--black);
            color: var(--white);
        }

        .btn-dark:hover {
            background: var(--gray-900);
        }

        .btn-outline {
            background: transparent;
            color: var(--black);
            border: 1.5px solid var(--black);
        }

        .btn-outline:hover {
            background: var(--gray-100);
        }

        
        .badge {
            display: inline-flex;
            align-items: center;
            padding: .18rem .6rem;
            border-radius: 99px;
            font-size: .74rem;
            font-weight: 600;
            letter-spacing: .02em;
        }

        .badge-dark {
            background: var(--black);
            color: var(--white);
        }

        .badge-gray {
            background: var(--gray-100);
            color: var(--gray-700);
            border: 1px solid var(--gray-200);
        }

        .badge-green {
            background: #e9f9ef;
            color: #1a6638;
            border: 1px solid #b3e8c8;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>

<body>

    <nav>
        <a href="{% url 'social_auth:login' %}" class="nav-brand">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
            </svg>
            SecureAuth
        </a>

        <div class="nav-right">
            {% if user.is_authenticated %}
            <span style="font-size:.85rem;color:var(--muted);">{{ user.email }}</span>
            <a href="{% url 'social_auth:logout' %}" class="nav-pill">Sign out</a>
            {% else %}
            <a href="{% url 'social_auth:login' %}" class="nav-pill">Sign in</a>
            {% endif %}
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>© 2025 <strong>SecureAuth</strong> &nbsp;·&nbsp; Django + django-allauth &nbsp;·&nbsp; Social Login Lab</p>
    </footer>

</body>

</html>
