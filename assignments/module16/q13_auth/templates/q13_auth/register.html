{% extends 'base.html' %}
{% block title %}Register — Q13{% endblock %}
{% block content %}
<div class="container fade-in" style="max-width:500px;">
  <div class="card" style="margin-top:3rem;">
    <div style="text-align:center;margin-bottom:1.5rem;"><div style="font-size:2.5rem;"></div><h2>Create Account</h2></div>
    {% for msg in messages %}<div class="alert {% if msg.tags == 'success' %}alert-success{% else %}alert-error{% endif %}">{{ msg }}</div>{% endfor %}
    <form method="post">{% csrf_token %}
      <div class="form-group"><label>Username *</label><input name="username" class="form-control" required></div>
      <div class="form-group"><label>Email</label><input name="email" type="email" class="form-control"></div>
      <div class="form-group"><label>Password *</label><input name="password" type="password" class="form-control" required></div>
      <div class="form-group"><label>Confirm Password *</label><input name="confirm_password" type="password" class="form-control" required></div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Create Account</button>
    </form>
    <div style="text-align:center;margin-top:1rem;color:var(--text-muted);font-size:0.875rem;">Already have an account? <a href="/q13/login/" style="color:var(--primary);">Login</a></div>
  </div>
</div>
{% endblock %}
