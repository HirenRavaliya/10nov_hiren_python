{% extends 'base.html' %}
{% block title %}Auth Home{% endblock %}
{% block content %}
<div class="container fade-in" style="max-width:600px;text-align:center;padding-top:4rem;">
  <h1 style="background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-size:2.5rem;margin-bottom:1rem;">Q13: User Auth</h1>
  <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;">
    <a href="/q13/register/" class="btn btn-primary" style="padding:0.8rem 2rem;">Register</a>
    <a href="/q13/login/" class="btn btn-outline" style="padding:0.8rem 2rem;">Login</a>
  </div>
  {% if messages %}{% for msg in messages %}<div class="alert {% if msg.tags == 'success' %}alert-success{% else %}alert-error{% endif %}" style="margin-top:1.5rem;">{{ msg }}</div>{% endfor %}{% endif %}
</div>
{% endblock %}
