{% extends 'base.html' %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<div class="container fade-in">
  <div class="page-header"><h1>Reset Password</h1></div>
  <div class="card" style="max-width:500px;margin:0 auto;">
    <p style="margin-bottom:1rem;">Forgotten your password? Enter your email address below, and we'll email instructions for setting a new one.</p>
    <form method="POST">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:1rem;">Send Reset Email</button>
    </form>
  </div>
</div>
{% endblock %}
