{% extends 'base.html' %}
{% block title %}Update Profile{% endblock %}
{% block content %}
<div class="container fade-in">
  <div class="page-header">
    <h1>Update Profile</h1>
    </div>
  <div class="card" style="max-width:500px;margin:0 auto;">
    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label>Username</label>
        <input type="text" class="form-control" value="{{ user.username }}" disabled style="background:#f5f5f5; cursor:not-allowed;">
      </div>
      <div class="form-group">
        <label>First Name</label>
        <input type="text" name="first_name" class="form-control" value="{{ user.first_name }}">
      </div>
      <div class="form-group">
        <label>Last Name</label>
        <input type="text" name="last_name" class="form-control" value="{{ user.last_name }}">
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" class="form-control" value="{{ user.email }}">
      </div>
      <div style="display:flex;gap:1rem;margin-top:1.5rem;">
        <button type="submit" class="btn btn-primary" style="flex:1;">Save Profile</button>
        <a href="{% url 'q13_dashboard' %}" class="btn btn-outline" style="flex:1;">Cancel</a>
      </div>
      <div style="margin-top:1rem;text-align:center;">
        <a href="{% url 'q13_password_change' %}" style="color:var(--text-secondary);font-size:0.85rem;">Change Password</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
