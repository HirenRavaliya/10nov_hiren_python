{% extends 'base.html' %}
{% block title %}Login — Q13{% endblock %}
{% block content %}
<div class="container fade-in" style="max-width:500px;">
  <div class="card" style="margin-top:3rem;">
    <div style="text-align:center;margin-bottom:1.5rem;"><div style="font-size:2.5rem;"></div><h2>Login</h2></div>
    {% for msg in messages %}<div class="alert {% if msg.tags == 'success' %}alert-success{% else %}alert-error{% endif %}">{{ msg }}</div>{% endfor %}
    <form method="post">{% csrf_token %}
      <div class="form-group"><label>Username</label><input name="username" class="form-control" required></div>
      <div class="form-group"><label>Password</label><input name="password" type="password" class="form-control" required></div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Login</button>
    </form>
    <div style="text-align:center;margin-top:1rem;font-size:0.875rem;">
      <a href="{% url 'q13_password_reset' %}" style="color:var(--text-secondary);">Forgot Password?</a>
    </div>
    <div style="text-align:center;margin-top:0.5rem;color:var(--text-muted);font-size:0.875rem;">No account? <a href="{% url 'q13_register' %}" style="color:var(--primary);">Register</a></div>
  </div>
</div>
{% endblock %}
